services:
  smanka-school-profile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smanka-school-profile
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5433/${POSTGRES_DB}?schema=public
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M