services:
  smanka-school-profile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smanka-school-profile
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # postgres:
  #   image: postgres:16-alpine
  #   container_name: smanka-postgres
  #   restart: always
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Tidak expose port ke luar — hanya bisa diakses internal
    # Uncomment baris ini HANYA untuk debug lokal:
    # ports:
    #   - "127.0.0.1:5432:5432"

# volumes:
#   postgres_data:
#     driver: local

networks:
  app-network:
    driver: bridge