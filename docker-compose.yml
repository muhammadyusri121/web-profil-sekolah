services:
  cms-app:
    build:
      context: .  # Titik artinya "Gunakan folder tempat file ini berada"
      dockerfile: Dockerfile
    container_name: smanka-cms-app
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:3000
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./prisma:/app/prisma
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
