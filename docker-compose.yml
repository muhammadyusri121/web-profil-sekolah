services:
  cms-app:
    build:
      context: .  # Titik artinya "Gunakan folder tempat file ini berada"
      dockerfile: Dockerfile
    container_name: smanka-cms-app
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3000
    ports:
      - "3001:3000"
    volumes:
      - ./prisma:/app/prisma
